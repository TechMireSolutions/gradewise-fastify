name: GradeWise AI Live Production Pipeline

on:
  push:
    branches:
      - main # Jab bhi main branch par push ya merge hoga, pipeline chal paregi

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Pipeline Triggered Successfully..."
            
            # Main Directory mein move karna
            cd /www/wwwroot/gradewiseai.techmiresolutions.com
            
            # Fresh code pull karna git se
            git pull origin main

            # ---------------------------------------------
            # 1. BACKEND DEPLOYMENT (Fastify)
            # ---------------------------------------------
            echo "⚙️ Deploying Fastify Backend..."
            cd grade-wise-ai-backend-fastify
            npx pnpm install
            npx drizzle-kit push
            npx pnpm run build
            npx pm2 restart gradewise_backend || NODE_ENV=production npx pm2 start dist/index.js --name "gradewise_backend"
            
            # ---------------------------------------------
            # 2. FRONTEND DEPLOYMENT (Next.js)
            # ---------------------------------------------
            echo "📦 Deploying Next.js Frontend..."
            cd ../grade-wise-ai-frontend-next
            npx pnpm install
            npx pnpm add react-router-dom # Missing router utility fallback
            rm -rf .next
            npx next build --webpack
            npx pm2 restart gradewise_frontend || npx pm2 start npx --name "gradewise_frontend" -- pnpm next start -p 3000

            echo "✅ Everything is up-to-date and live!"
